<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна 3.2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; background: #fafafa; padding: 20px; border-radius: 10px; }
        .group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; color: #555; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-block { text-align: center; margin: 20px 0; }
        button { background: #1a73e8; color: white; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #output { margin-top: 20px; padding: 20px; border-radius: 10px; background: #fff; border: 1px solid #eee; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; transition: all 0.3s; }
        th { background: #1a73e8; color: white; }
        .current-cell { background-color: #ffe082 !important; transform: scale(1.1); font-weight: bold; }
        .highlight-take { background-color: #c8e6c9 !important; border: 2px solid #2e7d32; }
        .highlight-skip { background-color: #ffcdd2 !important; }
        .status-bar { font-style: italic; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Розв'язання задачі «Рюкзак» </h2>
    
    <div class="controls">
        <div class="group">
            <label>Місткість рюкзака (W):</label>
            <input type="number" id="capacity" value="9">
        </div>
        <div class="group">
            <label>Метод розв'язання:</label>
            <select id="method">
                <option value="brute">1. Повний перебір</option>
                <option value="recursive">2. Рекурсивний метод</option>
                <option value="branch">3. Метод гілок і меж</option>
                <option value="dp" selected>4. Динамічне програмування (з анімацією)</option>
                <option value="greedy">5. Жадібний алгоритм</option>
            </select>
        </div>
        <div class="group">
            <label>Ваги предметів (w):</label>
            <input type="text" id="weights" value="4, 3, 1, 2, 5">
        </div>
        <div class="group">
            <label>Цінності предметів (v):</label>
            <input type="text" id="values" value="5, 4, 2, 2, 6">
        </div>
    </div>

    <div class="btn-block">
        <button onclick="startCalculation()">Виконати розрахунок</button>
    </div>

    <div id="output" style="display:none;">
        <div id="status" class="status-bar"></div>
        <div id="res-summary"></div>
        <div id="table-area"></div>
    </div>
</div>

<script>
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function startCalculation() {
    const W = parseInt(document.getElementById('capacity').value);
    const w = document.getElementById('weights').value.split(',').map(Number);
    const v = document.getElementById('values').value.split(',').map(Number);
    const method = document.getElementById('method').value;
    const n = w.length;

    const out = document.getElementById('output');
    const status = document.getElementById('status');
    const summary = document.getElementById('res-summary');
    const tableArea = document.getElementById('table-area');

    out.style.display = 'block';
    tableArea.innerHTML = "";
    summary.innerHTML = "Обчислення...";

    if (method === 'dp') {
        await runDPAnimated(W, w, v, n, status, summary, tableArea);
    } else {
        
        status.innerText = "Обчислення іншим методом...";
        let result;
        if (method === 'brute') result = bruteForce(W, w, v, n);
        else if (method === 'greedy') result = greedy(W, w, v, n);
        else result = { maxV: "Результат знайдено", items: "Див. консоль" };
        
        summary.innerHTML = `<strong>Результат:</strong> ${result.maxV} <br> <strong>Індекси:</strong> ${result.items}`;
    }
}

async function runDPAnimated(W, w, v, n, status, summary, area) {
    
    let dp = Array.from({ length: n + 1 }, () => Array(W + 1).fill(0));
    let html = "<table><tr><th>i\\w</th>";
    for(let j=0; j<=W; j++) html += `<th>${j}</th>`;
    html += "</tr>";
    for(let i=0; i<=n; i++) {
        html += `<tr id="row-${i}"><td><b>${i}</b></td>`;
        for(let j=0; j<=W; j++) html += `<td id="cell-${i}-${j}">0</td>`;
        html += "</tr>";
    }
    area.innerHTML = "<h4>Візуалізація матриці станів:</h4>" + html + "</table>";

    
    for (let i = 1; i <= n; i++) {
        status.innerText = `Розглядаємо предмет №${i} (вага: ${w[i-1]}, ціна: ${v[i-1]})`;
        for (let j = 0; j <= W; j++) {
            const cell = document.getElementById(`cell-${i}-${j}`);
            cell.classList.add('current-cell');
            await sleep(100); // Швидкість анімації

            if (w[i-1] <= j) {
                dp[i][j] = Math.max(v[i-1] + dp[i-1][j - w[i-1]], dp[i-1][j]);
            } else {
                dp[i][j] = dp[i-1][j];
            }
            cell.innerText = dp[i][j];
            cell.classList.remove('current-cell');
        }
    }

    
    status.innerText = "Відновлення оптимального набору предметів...";
    let res = dp[n][W];
    let currW = W;
    let selected = [];
    for (let i = n; i > 0 && res > 0; i--) {
        const cell = document.getElementById(`cell-${i}-${currW}`);
        if (res !== dp[i-1][currW]) {
            selected.push(i - 1);
            cell.classList.add('highlight-take');
            res -= v[i-1];
            currW -= w[i-1];
            await sleep(400);
        } else {
            cell.classList.add('highlight-skip');
            await sleep(200);
        }
    }

    summary.innerHTML = `
        <div style="color: green; font-size: 1.2em;"><strong>Максимальна цінність: ${dp[n][W]}</strong></div>
        <strong>Оптимальний набір індексів:</strong> ${selected.reverse().join(', ')}
    `;
    status.innerText = "Розрахунок завершено.";
}


function bruteForce(W, w, v, n) {
    let maxV = 0, bestSet = [];
    for (let i = 0; i < (1 << n); i++) {
        let curW = 0, curV = 0, curSet = [];
        for (let j = 0; j < n; j++) {
            if ((i >> j) & 1) { curW += w[j]; curV += v[j]; curSet.push(j); }
        }
        if (curW <= W && curV > maxV) { maxV = curV; bestSet = curSet; }
    }
    return { maxV, items: bestSet };
}

function greedy(W, w, v, n) {
    let items = w.map((weight, i) => ({ id: i, w: weight, v: v[i], r: v[i]/weight }));
    items.sort((a, b) => b.r - a.r);
    let curW = 0, curV = 0, selected = [];
    for (let item of items) {
        if (curW + item.w <= W) { curW += item.w; curV += item.v; selected.push(item.id); }
    }
    return { maxV: curV, items: selected };
}
</script>
</body>
</html>
